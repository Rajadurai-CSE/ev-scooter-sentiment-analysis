name: EV review pipeline

on:
  schedule:
    - cron: "0 2 1,15 * *"   # 2 AM IST on 1st and 15th of every month
  workflow_dispatch:           # trigger manually from GitHub UI anytime

# BUG FIX 1: without this, git push fails with 403
# GitHub Actions token is read-only by default
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # scraper.py  →  data/master_reviews.csv  +  data/batches/YYYYMMDD_batch.csv
      - name: Run scraper
        run: python scraper.py 2>&1 | tee logs/scraper.log

      # cleaner.py  →  data/clean_reviews.csv
      # reads master_reviews.csv written by the step above
      - name: Run cleaner
        run: python cleaner.py 2>&1 | tee logs/cleaner.log

      # BUG FIX 2: MSG was captured but never used in commit -m
      # BUG FIX 3: authenticate with GITHUB_TOKEN so push succeeds
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Authenticate with the built-in GITHUB_TOKEN
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          # Pull commit message from scraper log
          # scraper.py logs: "COMMIT_MSG: data: pipeline run 2026-07-01 (+143 reviews, 5 skipped)"
          MSG=$(grep "COMMIT_MSG:" logs/scraper.log | sed 's/.*COMMIT_MSG: //')

          # Fallback if log line is missing for any reason
          if [ -z "$MSG" ]; then
            MSG="data: pipeline run $(date +%Y-%m-%d)"
          fi

          git add data/ logs/
          # --quiet exits 0 if nothing changed — skip commit if data unchanged
          git diff --staged --quiet || git commit -m "$MSG"
          git push